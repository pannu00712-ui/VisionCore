name: Build VisionCore Installers

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.9)'
        required: true
        default: '1.0.9'

permissions:
  contents: write

jobs:
  build:
    name: Build x64 + x86 installers
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $ver = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $ver = "${{ github.event.inputs.version }}"
          }
          echo "VERSION=$ver" >> $env:GITHUB_ENV
          echo "Resolved version: $ver"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install WiX
        run: |
          dotnet tool install --global wix --version 4.0.6
          wix extension add WixToolset.UI.wixext       --global
          wix extension add WixToolset.Util.wixext     --global
          wix extension add WixToolset.Firewall.wixext --global
          wix extension add WixToolset.Bal.wixext      --global

      - name: Restore NuGet packages
        run: dotnet restore VisionCore.sln

      - name: Publish WPF (x64)
        run: >
          dotnet publish VisionCore.WPF/VisionCore.WPF.csproj
          -c Release -r win-x64 --self-contained false
          -o publish/x64/app
          /p:DebugType=none /p:DebugSymbols=false /p:PublishSingleFile=false
          /p:Version=${{ env.VERSION }}

      - name: Publish Service (x64)
        run: >
          dotnet publish VisionCore.Service/VisionCore.Service.csproj
          -c Release -r win-x64 --self-contained false
          -o publish/x64/service
          /p:DebugType=none /p:DebugSymbols=false /p:PublishSingleFile=false
          /p:Version=${{ env.VERSION }}

      - name: Publish WPF (x86)
        run: >
          dotnet publish VisionCore.WPF/VisionCore.WPF.csproj
          -c Release -r win-x86 --self-contained false
          -o publish/x86/app
          /p:DebugType=none /p:DebugSymbols=false /p:PublishSingleFile=false
          /p:Version=${{ env.VERSION }}

      - name: Publish Service (x86)
        run: >
          dotnet publish VisionCore.Service/VisionCore.Service.csproj
          -c Release -r win-x86 --self-contained false
          -o publish/x86/service
          /p:DebugType=none /p:DebugSymbols=false /p:PublishSingleFile=false
          /p:Version=${{ env.VERSION }}

      - name: Build x64 installer
        run: >
          dotnet build VisionCore.Installer/VisionCore.Installer.csproj
          -c Release
          /p:SourceDir="${{ github.workspace }}\publish\x64"
          /p:OutputName=VisionCore-${{ env.VERSION }}-Setup-x64
          /p:ProductVersion=${{ env.VERSION }}
          /p:InstallerPlatform=x64

      - name: Build x64 bundle
        run: >
          dotnet build VisionCore.Installer/VisionCore.Bundle.csproj
          -c Release
          /p:MsiPath="${{ github.workspace }}\VisionCore.Installer\bin\Release\VisionCore-${{ env.VERSION }}-Setup-x64.msi"
          /p:OutputName=VisionCore-${{ env.VERSION }}-Setup-x64
          /p:ProductVersion=${{ env.VERSION }}

      - name: Build x86 installer
        run: >
          dotnet build VisionCore.Installer/VisionCore.Installer.csproj
          -c Release
          /p:SourceDir="${{ github.workspace }}\publish\x86"
          /p:OutputName=VisionCore-${{ env.VERSION }}-Setup-x86
          /p:ProductVersion=${{ env.VERSION }}
          /p:InstallerPlatform=x86

      - name: Build x86 bundle
        run: >
          dotnet build VisionCore.Installer/VisionCore.Bundle.csproj
          -c Release
          /p:MsiPath="${{ github.workspace }}\VisionCore.Installer\bin\Release\VisionCore-${{ env.VERSION }}-Setup-x86.msi"
          /p:OutputName=VisionCore-${{ env.VERSION }}-Setup-x86
          /p:ProductVersion=${{ env.VERSION }}

      - name: Collect installer files
        id: collect
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Get-ChildItem -Path "VisionCore.Installer\bin\Release" -Recurse -Include *.exe,*.msi |
            Copy-Item -Destination artifacts -Force
          Get-ChildItem artifacts | Format-Table Name, Length

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VisionCore-${{ env.VERSION }}-Installers
          path: artifacts/*
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          name: VisionCore v${{ env.VERSION }}
          tag_name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
