# ── Generate Directories.wxs with all harvested files ────────────
      - name: Generate file list for x64
        shell: pwsh
        run: |
          $appFiles = Get-ChildItem -Path "publish\x64\app" -File -Recurse
          $svcFiles = Get-ChildItem -Path "publish\x64\service" -File -Recurse
          
          $xml = @'
<?xml version="1.0" encoding="utf-8"?>
<Wix xmlns="http://wixtoolset.org/schemas/v4/wxs" xmlns:util="http://wixtoolset.org/schemas/v4/wxs/util">
  <Fragment>
    <StandardDirectory Id="ProgramFiles64Folder">
      <Directory Id="INSTALLDIR" Name="VisionCore">
        <Directory Id="INSTALLDIR_APP" Name="app" />
        <Directory Id="INSTALLDIR_SERVICE" Name="service">
          <Directory Id="INSTALLDIR_MEDIAMTX" Name="mediamtx" />
          <Directory Id="INSTALLDIR_FFMPEG" Name="ffmpeg" />
        </Directory>
        <Directory Id="INSTALLDIR_DATA" Name="data" />
      </Directory>
    </StandardDirectory>
    <StandardDirectory Id="DesktopFolder" />
  </Fragment>
  <Fragment>
    <ComponentGroup Id="StartMenuDirCleanup" Directory="INSTALLDIR_APP">
      <Component Id="StartMenuDummy" Guid="A1B2C3D4-E5F6-7890-ABCD-EF1234560001">
        <RegistryValue Root="HKCU" Key="SOFTWARE\VisionCore" Name="Installed" Type="integer" Value="1" KeyPath="yes" />
      </Component>
    </ComponentGroup>
  </Fragment>
  <Fragment>
    <ComponentGroup Id="AppFiles" Directory="INSTALLDIR_APP">
'@
          $i = 1
          foreach ($f in $appFiles) {
            $rel = $f.FullName.Replace("$PWD\publish\x64\app\", "")
            $id = "AppFile_$i"
            $guid = [guid]::NewGuid().ToString().ToUpper()
            $xml += "      <Component Id=`"$id`" Guid=`"$guid`"><File Id=`"${id}F`" Source=`"`$(var.SourceDir)\app\$rel`" KeyPath=`"yes`" /></Component>`n"
            $i++
          }
          $xml += @'
    </ComponentGroup>
  </Fragment>
  <Fragment>
    <ComponentGroup Id="ServiceFiles" Directory="INSTALLDIR_SERVICE">
'@
          foreach ($f in $svcFiles) {
            $rel = $f.FullName.Replace("$PWD\publish\x64\service\", "")
            $id = "SvcFile_$i"
            $guid = [guid]::NewGuid().ToString().ToUpper()
            $xml += "      <Component Id=`"$id`" Guid=`"$guid`"><File Id=`"${id}F`" Source=`"`$(var.SourceDir)\service\$rel`" KeyPath=`"yes`" /></Component>`n"
            $i++
          }
          $xml += @'
      <Component Id="DirMediaMtx" Guid="B0D8E9F1-A2C3-4567-1234-567890123457">
        <CreateFolder Directory="INSTALLDIR_MEDIAMTX" />
        <RegistryValue Root="HKLM" Key="SOFTWARE\VisionCore" Name="MediaMtxDir" Type="string" Value="[INSTALLDIR_MEDIAMTX]" KeyPath="yes" />
      </Component>
      <Component Id="DirFfmpeg" Guid="C1E9F0A2-B3D4-5678-2345-678901234568">
        <CreateFolder Directory="INSTALLDIR_FFMPEG" />
        <RegistryValue Root="HKLM" Key="SOFTWARE\VisionCore" Name="FfmpegDir" Type="string" Value="[INSTALLDIR_FFMPEG]" KeyPath="yes" />
      </Component>
    </ComponentGroup>
  </Fragment>
  <Fragment>
    <ComponentGroup Id="DataDir" Directory="INSTALLDIR_DATA">
      <Component Id="DirData" Guid="D2F0A1B3-C4E5-6789-3456-789012345679">
        <CreateFolder Directory="INSTALLDIR_DATA" />
        <RegistryValue Root="HKLM" Key="SOFTWARE\VisionCore" Name="DataDir" Type="string" Value="[INSTALLDIR_DATA]" KeyPath="yes" />
      </Component>
    </ComponentGroup>
  </Fragment>
</Wix>
'@
          $xml | Out-File "VisionCore.Installer\Directories.wxs" -Encoding UTF8
          Write-Host "Generated Directories.wxs with $($appFiles.Count) app files and $($svcFiles.Count) service files"